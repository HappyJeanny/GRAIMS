<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprecher-Ansicht | Datenschutz & KI: Was wirklich gilt | KI Strategie & Co.</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 15px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
        .header-logo { height: 28px; width: auto; opacity: 0.85; }
        .header-title { font-size: 0.85em; color: #8b949e; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
        .slide-counter { font-size: 1.1em; font-weight: 700; color: #58a6ff; background: rgba(88,166,255,0.1); padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(88,166,255,0.3); }
        .main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .section-current { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 20px; flex-shrink: 0; }
        .section-label { font-size: 0.7em; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #58a6ff; margin-bottom: 6px; }
        .current-title { font-size: 1.4em; font-weight: 600; color: #e6edf3; line-height: 1.3; }
        .section-notes { flex: 1; overflow-y: auto; padding: 16px 20px; background: #0d1117; }
        .section-notes .section-label { color: #3fb950; margin-bottom: 10px; }
        .notes-content { line-height: 1.75; color: #c9d1d9; font-size: 1.05em; }
        .notes-content p { margin-bottom: 0.6em; padding-left: 1.2em; position: relative; }
        .notes-content p::before { content: '•'; position: absolute; left: 0; color: #3fb950; font-weight: 700; }
        .notes-empty { color: #484f58; font-style: italic; font-size: 0.95em; padding-left: 0; }
        .notes-empty::before { display: none; }
        .section-next { background: #161b22; border-top: 1px solid #30363d; padding: 12px 20px; flex-shrink: 0; }
        .section-next .section-label { color: #d29922; }
        .next-title { font-size: 1em; color: #8b949e; font-style: italic; }
        .footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #161b22; border-top: 1px solid #30363d; flex-shrink: 0; }
        .nav-controls { display: flex; gap: 8px; }
        .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #30363d; background: #21262d; color: #e6edf3; font-size: 1em; cursor: pointer; transition: background 0.2s, border-color 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover { background: #30363d; border-color: #58a6ff; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .nav-btn:disabled:hover { background: #21262d; border-color: #30363d; }
        .status { display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: #8b949e; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #484f58; transition: background 0.3s; }
        .status.connected .status-dot { background: #3fb950; box-shadow: 0 0 6px rgba(63,185,80,0.5); }
        .status.connected .status-text { color: #3fb950; }
        .section-notes::-webkit-scrollbar { width: 6px; }
        .section-notes::-webkit-scrollbar-track { background: transparent; }
        .section-notes::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    </style>
</head>
<body>
    <header class="header">
        <img src="../presentation-template/assets/logo-ki-strategie-co.svg" alt="Logo" class="header-logo">
        <span class="header-title">Sprecher-Ansicht – Datenschutz & KI: Was wirklich gilt</span>
        <span class="slide-counter" id="slideCounter">– / –</span>
    </header>
    <main class="main">
        <div class="section-current">
            <div class="section-label">Aktuelle Folie</div>
            <div class="current-title" id="currentTitle">Warte auf Präsentation…</div>
        </div>
        <div class="section-notes">
            <div class="section-label">Notizen</div>
            <div class="notes-content" id="notesContent">
                <p class="notes-empty">Keine Notizen für diese Folie.</p>
            </div>
        </div>
        <div class="section-next">
            <div class="section-label">Nächste Folie</div>
            <div class="next-title" id="nextTitle">–</div>
        </div>
    </main>
    <footer class="footer">
        <div class="nav-controls">
            <button class="nav-btn" id="firstBtn" title="Erste Folie">⏮</button>
            <button class="nav-btn" id="prevBtn" title="Zurück">◀</button>
            <button class="nav-btn" id="nextBtn" title="Weiter">▶</button>
            <button class="nav-btn" id="lastBtn" title="Letzte Folie">⏭</button>
        </div>
        <div class="status" id="statusIndicator">
            <span class="status-dot"></span>
            <span class="status-text" id="statusText">Warte auf Präsentation…</span>
        </div>
    </footer>
    <script>
        const channel = new BroadcastChannel('ki-presentation-sync');
        let totalSlides = 0, currentIndex = 0;
        const slideCounter = document.getElementById('slideCounter');
        const currentTitle = document.getElementById('currentTitle');
        const notesContent = document.getElementById('notesContent');
        const nextTitle    = document.getElementById('nextTitle');
        const statusInd    = document.getElementById('statusIndicator');
        const statusText   = document.getElementById('statusText');
        const firstBtn     = document.getElementById('firstBtn');
        const prevBtn      = document.getElementById('prevBtn');
        const nextBtn      = document.getElementById('nextBtn');
        const lastBtn      = document.getElementById('lastBtn');
        channel.addEventListener('message', (e) => { if (e.data.type === 'slide-changed') applyState(e.data); });
        function applyState(data) {
            currentIndex = data.index; totalSlides = data.total;
            slideCounter.textContent = `${data.index + 1} / ${data.total}`;
            currentTitle.textContent = data.title || `Folie ${data.index + 1}`;
            if (data.notes && data.notes.trim()) {
                notesContent.innerHTML = data.notes;
                notesContent.querySelectorAll('p').forEach(p => { if (!p.textContent.trim()) p.style.display = 'none'; });
            } else {
                notesContent.innerHTML = '<p class="notes-empty">Keine Notizen für diese Folie.</p>';
            }
            nextTitle.textContent = data.nextTitle ? `"${data.nextTitle}"` : '— Ende der Präsentation —';
            prevBtn.disabled = data.index === 0; firstBtn.disabled = data.index === 0;
            nextBtn.disabled = data.index === data.total - 1; lastBtn.disabled = data.index === data.total - 1;
            statusInd.classList.add('connected'); statusText.textContent = 'Verbunden';
        }
        firstBtn.addEventListener('click', () => channel.postMessage({ type: 'navigate-first' }));
        prevBtn.addEventListener('click',  () => channel.postMessage({ type: 'navigate-prev'  }));
        nextBtn.addEventListener('click',  () => channel.postMessage({ type: 'navigate-next'  }));
        lastBtn.addEventListener('click',  () => channel.postMessage({ type: 'navigate-last'  }));
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); channel.postMessage({ type: 'navigate-next' }); break;
                case 'ArrowLeft':  case 'PageUp':             e.preventDefault(); channel.postMessage({ type: 'navigate-prev' }); break;
                case 'Home': e.preventDefault(); channel.postMessage({ type: 'navigate-first' }); break;
                case 'End':  e.preventDefault(); channel.postMessage({ type: 'navigate-last'  }); break;
            }
        });
        channel.postMessage({ type: 'request-state' });
    </script>
</body>
</html>
