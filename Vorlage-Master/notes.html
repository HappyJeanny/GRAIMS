<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprecher-Ansicht · GRAIMS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 15px;
}

/* ── Header ─────────────────────────────────── */
.hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}

.hd-logo {
  height: 28px;
  opacity: .82;
}

.hd-title {
  font-size: .78em;
  color: #8b949e;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.hd-counter {
  font-size: 1em;
  font-weight: 700;
  color: #00B4C8;
  background: rgba(0,180,200,.1);
  border: 1px solid rgba(0,180,200,.3);
  padding: 4px 14px;
  border-radius: 20px;
}

/* ── Main layout ─────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

/* ── Current slide block ─────────────────────── */
.cur-block {
  padding: 16px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}

.block-label {
  font-size: .65em;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 7px;
}

.block-label.teal  { color: #00B4C8; }
.block-label.green { color: #3fb950; }
.block-label.gold  { color: #C4A84D; }

.cur-title {
  font-size: 1.3em;
  font-weight: 600;
  line-height: 1.35;
  color: #e6edf3;
}

/* ── Notes area ──────────────────────────────── */
.notes-area {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
  background: #0d1117;
}

.notes-body {
  font-size: 1.05em;
  line-height: 1.78;
  color: #c9d1d9;
}

.notes-body p {
  display: flex;
  gap: 10px;
  padding: 4px 0;
}

.notes-body p::before {
  content: '·';
  color: #3fb950;
  font-weight: 700;
  flex-shrink: 0;
}

.notes-empty {
  color: #484f58;
  font-style: italic;
  font-size: .95em;
}

.notes-empty::before { display: none !important; }

/* ── Next slide block ────────────────────────── */
.next-block {
  padding: 14px 20px;
  background: #161b22;
  border-top: 1px solid #30363d;
  flex-shrink: 0;
}

.next-title {
  font-size: .95em;
  color: #8b949e;
  font-style: italic;
}

/* ── Footer / Nav ────────────────────────────── */
.ft {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #161b22;
  border-top: 1px solid #30363d;
  flex-shrink: 0;
}

.nav-btns {
  display: flex;
  gap: 8px;
}

.nav-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid #30363d;
  background: #21262d;
  color: #e6edf3;
  font-size: 1em;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, border-color .15s;
}

.nav-btn:hover  { background: #30363d; border-color: #00B4C8; }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.nav-btn:disabled:hover { background: #21262d; border-color: #30363d; }

/* ── Status indicator ────────────────────────── */
.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .82em;
  color: #8b949e;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #484f58;
  transition: background .3s;
}

.status.connected .status-dot {
  background: #3fb950;
  box-shadow: 0 0 6px rgba(63,185,80,.5);
}

.status.connected .status-text { color: #3fb950; }

/* ── Scrollbar ───────────────────────────────── */
.notes-area::-webkit-scrollbar { width: 5px; }
.notes-area::-webkit-scrollbar-track { background: transparent; }
.notes-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<header class="hd">
  <img src="../assets/logo.png" alt="GRAIMS" class="hd-logo">
  <span class="hd-title">Sprecher-Ansicht</span>
  <span class="hd-counter" id="counter">– / –</span>
</header>

<main class="main">

  <div class="cur-block">
    <div class="block-label teal">Aktuelle Folie</div>
    <div class="cur-title" id="curTitle">Warte auf Präsentation …</div>
  </div>

  <div class="notes-area">
    <div class="block-label green" style="margin-bottom:12px">Notizen</div>
    <div class="notes-body" id="notesBody">
      <p class="notes-empty">Keine Verbindung zur Präsentation.</p>
    </div>
  </div>

  <div class="next-block">
    <div class="block-label gold" style="margin-bottom:6px">Nächste Folie</div>
    <div class="next-title" id="nextTitle">–</div>
  </div>

</main>

<footer class="ft">
  <div class="nav-btns">
    <button class="nav-btn" id="firstBtn" title="Erste Folie (Home)" disabled>⏮</button>
    <button class="nav-btn" id="prevBtn"  title="Zurück (←)"         disabled>◀</button>
    <button class="nav-btn" id="nextBtn"  title="Weiter (→)"         disabled>▶</button>
    <button class="nav-btn" id="lastBtn"  title="Letzte Folie (End)" disabled>⏭</button>
  </div>
  <div class="status" id="status">
    <span class="status-dot"></span>
    <span class="status-text" id="statusText">Warte auf Präsentation …</span>
  </div>
</footer>

<script>
(function () {
  'use strict';

  var channel   = new BroadcastChannel('graims-presentation');
  var counter   = document.getElementById('counter');
  var curTitle  = document.getElementById('curTitle');
  var notesBody = document.getElementById('notesBody');
  var nextTitle = document.getElementById('nextTitle');
  var status    = document.getElementById('status');
  var statusTxt = document.getElementById('statusText');
  var firstBtn  = document.getElementById('firstBtn');
  var prevBtn   = document.getElementById('prevBtn');
  var nextBtn   = document.getElementById('nextBtn');
  var lastBtn   = document.getElementById('lastBtn');

  function applyState(data) {
    counter.textContent  = (data.index + 1) + ' / ' + data.total;
    curTitle.textContent = data.title || ('Folie ' + (data.index + 1));

    /* Render notes */
    if (data.notes && data.notes.trim()) {
      /* Strip HTML tags from notes aside content */
      var tmp = document.createElement('div');
      tmp.innerHTML = data.notes;
      var text = tmp.textContent || tmp.innerText || '';
      var lines = text.split(/\n+/)
                      .map(function (l) { return l.trim(); })
                      .filter(Boolean);
      notesBody.innerHTML = lines
        .map(function (l) { return '<p>' + escHtml(l) + '</p>'; })
        .join('');
    } else {
      notesBody.innerHTML = '<p class="notes-empty">Keine Notizen für diese Folie.</p>';
    }

    nextTitle.textContent = data.nextTitle
      ? '→ ' + data.nextTitle
      : '— Ende der Präsentation —';

    firstBtn.disabled = data.index === 0;
    prevBtn.disabled  = data.index === 0;
    nextBtn.disabled  = data.index === data.total - 1;
    lastBtn.disabled  = data.index === data.total - 1;

    status.classList.add('connected');
    statusTxt.textContent = 'Verbunden';
  }

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  /* Receive state from presentation */
  channel.addEventListener('message', function (e) {
    if (e.data.type === 'slide-changed') applyState(e.data);
  });

  /* Send navigation commands to presentation */
  firstBtn.addEventListener('click', function () { channel.postMessage({ type: 'navigate-first' }); });
  prevBtn.addEventListener('click',  function () { channel.postMessage({ type: 'navigate-prev'  }); });
  nextBtn.addEventListener('click',  function () { channel.postMessage({ type: 'navigate-next'  }); });
  lastBtn.addEventListener('click',  function () { channel.postMessage({ type: 'navigate-last'  }); });

  /* Keyboard navigation also works from notes window */
  document.addEventListener('keydown', function (e) {
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown':
        e.preventDefault(); channel.postMessage({ type: 'navigate-next' }); break;
      case 'ArrowLeft':  case 'PageUp':
        e.preventDefault(); channel.postMessage({ type: 'navigate-prev' }); break;
      case 'Home': e.preventDefault(); channel.postMessage({ type: 'navigate-first' }); break;
      case 'End':  e.preventDefault(); channel.postMessage({ type: 'navigate-last'  }); break;
    }
  });

  /* Request current state on load */
  channel.postMessage({ type: 'request-state' });
}());
</script>
</body>
</html>
